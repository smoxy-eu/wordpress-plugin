name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build a release for, e.g. v0.1.0'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve tag / version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "error: tag '$TAG' does not look like vMAJOR.MINOR.PATCH"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify version in plugin matches tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          HEADER=$(awk '/^[[:space:]]*\*[[:space:]]*Version:/ { print $3; exit }' smoxy.php)
          CONST=$(awk -F"'" "/define\\(.*SMOXY_VERSION/ { print \$4; exit }" smoxy.php)
          STABLE=$(awk '/^Stable tag:/ { print $3; exit }' readme.txt)
          fail=0
          for pair in "header:$HEADER" "constant:$CONST" "stable-tag:$STABLE"; do
            name="${pair%%:*}"; val="${pair#*:}"
            if [ "$val" != "$VERSION" ]; then
              echo "mismatch: $name=$val, tag=$VERSION"
              fail=1
            fi
          done
          [ "$fail" = "0" ]

      - name: Build distribution archives
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -e
          mkdir -p build/smoxy dist
          rsync -a --exclude-from=.distignore ./ build/smoxy/
          ( cd build && zip -qr "../dist/smoxy-${VERSION}.zip" smoxy )
          tar -C build -czf "dist/smoxy-${VERSION}.tar.gz" smoxy
          ( cd dist && sha256sum "smoxy-${VERSION}.zip" "smoxy-${VERSION}.tar.gz" > "smoxy-${VERSION}-SHA256SUMS.txt" )
          ls -la dist/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/smoxy-${{ steps.version.outputs.version }}.zip
            dist/smoxy-${{ steps.version.outputs.version }}.tar.gz
            dist/smoxy-${{ steps.version.outputs.version }}-SHA256SUMS.txt
