name: Lint

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2
      - uses: ramsey/composer-install@v3
      - run: vendor/bin/phpstan analyse --no-progress

  wpcs:
    name: WPCS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2
      - uses: ramsey/composer-install@v3
      - run: vendor/bin/phpcs -q --report=full

  php-compat:
    name: PHP Compatibility (8.0+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2
      - uses: ramsey/composer-install@v3
      - run: |
          vendor/bin/phpcs -q --report=full \
            --standard=PHPCompatibilityWP \
            --runtime-set testVersion 8.0- \
            --extensions=php \
            --ignore='*/vendor/*,*/node_modules/*,*/languages/*,*/.wordpress-org/*' \
            .
