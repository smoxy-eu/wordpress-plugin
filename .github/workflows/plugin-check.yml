name: Plugin Check

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: plugin-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  plugin-check:
    name: wp plugin check
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot --silent"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=30
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: mysqli, mbstring, xml
          tools: composer:v2, wp-cli
      - name: Install production composer deps
        run: composer install --no-dev --no-interaction --optimize-autoloader --prefer-dist
      - name: Bootstrap WordPress + install plugin
        run: |
          set -e
          mkdir -p /tmp/wp && cd /tmp/wp
          wp core download --version=latest
          echo "--- resolved WP version ---"
          wp core version
          wp config create --dbname=wordpress --dbuser=root --dbpass=root --dbhost=127.0.0.1:3306
          wp core install --url=http://localhost --title=Test --admin_user=admin \
            --admin_password=admin --admin_email=test@example.com --skip-email
          mkdir -p wp-content/plugins/smoxy
          # Mirror the distributable plugin (same exclusions as the release
          # workflow uses) so plugin-check inspects only what ships, not
          # tests/, OSS docs, build/, etc.
          rsync -a --exclude-from="${GITHUB_WORKSPACE}/.distignore" \
            "${GITHUB_WORKSPACE}/" wp-content/plugins/smoxy/
          wp plugin install plugin-check --activate
          wp plugin check smoxy
