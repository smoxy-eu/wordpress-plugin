name: PHPUnit

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: phpunit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  phpunit:
    name: PHP ${{ matrix.php }} / WP ${{ matrix.wp }}
    runs-on: ubuntu-latest
    needs: []
    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.1', wp: 'latest' }
          - { php: '8.2', wp: 'latest' }
          - { php: '8.3', wp: 'latest' }
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot --silent"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=30
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: mysqli, mbstring, xml
          tools: composer:v2
      - uses: ramsey/composer-install@v3
      - name: Install subversion (for WP test library)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends subversion
      - name: Install WordPress test suite
        run: bash tests/bin/install-wp-tests.sh wordpress_test root root 127.0.0.1:3306 ${{ matrix.wp }} true
      - name: Run PHPUnit
        run: vendor/bin/phpunit --colors=always --log-junit junit.xml
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: junit-php${{ matrix.php }}-wp${{ matrix.wp }}
          path: junit.xml
          retention-days: 7

  phpunit-trunk:
    name: PHP 8.3 / WP trunk (allowed to fail)
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot --silent"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=30
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: mysqli, mbstring, xml
          tools: composer:v2
      - uses: ramsey/composer-install@v3
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends subversion
      - run: bash tests/bin/install-wp-tests.sh wordpress_test root root 127.0.0.1:3306 nightly true
      - run: vendor/bin/phpunit --colors=always --log-junit junit.xml
      - if: always()
        uses: actions/upload-artifact@v5
        with:
          name: junit-trunk
          path: junit.xml
          retention-days: 7
